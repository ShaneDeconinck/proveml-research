<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify mode: healthcare errors</title>
  <style>
:root {
  --teal: #1a7a6d;
  --violet: #6b4c9a;
  --red: #c0392b;
  --amber: #b8860b;
  --blue: #2f6fb3;
  --gray-200: #ddd8d1;
  --gray-400: #9a938b;
  --gray-600: #5c5751;
  --gray-800: #2b2825;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 22px 28px;
  background: #fff;
  color: var(--gray-800);
  font-family: "Charter", "Georgia", serif;
}
.figure {
  max-width: 1180px;
}
.label {
  font-family: "Helvetica Neue", Arial, sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 14px;
}
.narrative {
  font-size: 18px;
  line-height: 1.9;
}
.narrative p { margin: 0 0 12px 0; }
.meta {
  margin-top: 16px;
  padding-top: 10px;
  border-top: 1px solid var(--gray-200);
  font-family: "Helvetica Neue", Arial, sans-serif;
  font-size: 12px;
  color: var(--gray-600);
}
.meta strong { color: var(--gray-800); }
.source {
  white-space: pre-wrap;
  font-family: Menlo, Consolas, monospace;
  font-size: 13px;
  line-height: 1.75;
  color: var(--gray-800);
}
.source .s-entity { color: var(--teal); font-weight: 600; }
.source .s-fact { color: var(--blue); }
.source .s-inference { color: var(--violet); }

.proveml-entity {
  color: var(--entity-color, var(--teal));
  font-weight: 600;
  border-bottom: 1.6px solid var(--entity-color, var(--teal));
  text-decoration: none;
}
.proveml-entity.proveml-name-mismatch,
.proveml-entity.proveml-unverifiable {
  color: var(--red);
  border-bottom-color: var(--red);
}

.proveml-fact {
  font-weight: 600;
}
.proveml-fact.proveml-verified {
  border-bottom: 2px dotted var(--entity-color, var(--teal));
}
.proveml-fact.proveml-mismatch {
  color: var(--red);
  border-bottom: 2px dotted var(--red);
}
.proveml-fact.proveml-unverifiable,
.proveml-fact.proveml-no-context {
  color: var(--amber);
  border-bottom: 2px dotted var(--amber);
}

.proveml-inference.proveml-verified {
  border-bottom: 2px dashed var(--violet);
}
.proveml-inference.proveml-failed {
  color: var(--red);
  border-bottom: 2px dashed var(--red);
}

.proveml-proof {
  margin-left: 4px;
  color: var(--gray-400);
  font-family: Menlo, Consolas, monospace;
  font-size: 0.75em;
  font-weight: 400;
  white-space: nowrap;
}
</style>
</head>
<body class="">
  <main class="figure">
    <div class="label">Verify mode: healthcare errors</div>
    <div class="narrative"><p><span class="proveml-entity proveml-verified" data-entity="patient:308" title="patient:308.name">Maria Jansen</span> presented with a fasting glucose level of <span class="proveml-fact proveml-mismatch" data-entity="patient:308" data-path="patient:308.glucose" title="patient:308.glucose: expected 142 mg/dL">118 mg/dL</span>. <span class="proveml-inference proveml-verified" data-condition="IS_ELEVATED_GLUCOSE" title="?[glu: IS_ELEVATED_GLUCOSE]">This is within the normal range</span>.</p><p style="margin-top:12px">Blood pressure was <span class="proveml-entity proveml-verified" data-entity="patient:308" title="patient:308.name">Maria Jansen</span>'s <span class="proveml-fact proveml-verified" data-entity="patient:308" data-path="patient:308.systolic" title="patient:308.systolic = 158">158</span>/<span class="proveml-fact proveml-mismatch" data-entity="patient:308" data-path="patient:308.diastolic" title="patient:308.diastolic: expected 94">84</span> mmHg.</p></div>
    <div class="meta">4/6 claims verified · 2 entities · 3 facts · 1 inferences · 2 issues</div>
  </main>
</body>
</html>
